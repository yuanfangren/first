name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap-job:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      # 关键点：必须设置 fetch-depth: 0 和 ref: ${{ github.ref }}
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0
          ref: ${{ github.ref }}

      # 2. 设置 Node.js 环境
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 生成 sitemap.xml
      - name: Generate sitemap
        run: npx -y sitemap-generator-cli https://timestamp-tool.com/

      # 4. 提交并推送更改
      # 关键点：这里显式指定分支为 github.ref
      - name: Commit and Push Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          # 这里的 github.ref 会告诉插件推送到当前分支 (main)
          branch: ${{ github.ref }}
          file_pattern: sitemap.xml
          commit_message: "自动更新 sitemap.xml"
          commit_user_name: "github-actions[bot]"
          commit_user_email: "41898282+github-actions[bot]@users.noreply.github.com"