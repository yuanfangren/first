name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap-job:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Check out the repository
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      # 2. 设置 Node.js
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 生成 sitemap.xml
      # 关键修改：
      # 1. 用引号包裹命令，防止冒号导致语法报错
      # 2. 加上 --crawl 参数，确保能抓取到 guide.html
      - name: Generate sitemap
        run: "npx -y sitemap-generator-cli -u https://timestamp-tool.com/ -d . --crawl"

      # 4. 自动提交并推送
      - name: Commit and Push Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          branch: main
          file_pattern: sitemap.xml
          commit_message: "chore: 自动更新 sitemap.xml"