name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap-job:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Check out the repository
        uses: actions/checkout@v3

      # 2. 设置 Node.js 环境
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 生成 sitemap.xml (使用 npx 直接运行，避免安装问题)
      # 注意：请将下面的域名修改为你自己的 GitHub Pages 域名
      - name: Generate sitemap
        run: npx -y sitemap-cli -u https://timestamp-tool.com/ -d . -o sitemap.xml

      # 4. 提交并推送更改
      - name: Commit and Push Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          file_pattern: sitemap.xml
          commit_message: "chore: auto update sitemap.xml"