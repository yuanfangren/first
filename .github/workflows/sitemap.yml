name: Generate Sitemap

on:
  push:
    branches:
      - main

jobs:
  sitemap-job:
    runs-on: ubuntu-latest

    steps:
      # 1. 拉取代码
      - name: Check out the repository
        uses: actions/checkout@v3

      # 2. 设置 Node.js 环境
      - name: Use Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # 3. 生成 sitemap.xml (更换为新工具 sitemap-generator-cli)
      # 注意：请将下面的域名修改为你自己的 GitHub Pages 域名
      - name: Generate sitemap
        run: npx -y sitemap-generator-cli https://timestamp-tool.com/

      # 4. 提交并推送更改
      - name: Commit and Push Sitemap
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "自动更新 sitemap.xml"
          file_pattern: sitemap.xml