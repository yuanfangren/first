<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Unix Timestamp Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        success: '#16a34a',
                        error: '#dc2626',
                        neutral: '#f3f4f6',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .result-success { @apply bg-green-50 border border-green-200 text-green-800; }
            .result-error { @apply bg-red-50 border border-red-200 text-red-800; }
            .result-neutral { @apply bg-gray-50 border border-gray-200 text-gray-700; }
            .input-focus { @apply ring-2 ring-primary/50 border-primary outline-none; }
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col">
<header class="bg-white shadow-sm py-4 px-6">
    <div class="max-w-3xl mx-auto">
        <h1 class="text-2xl font-bold text-gray-800">Unix Timestamp Converter</h1>
        <p class="text-gray-600 mt-1">Convert between Unix timestamp and datetime easily</p>
    </div>
</header>

<main class="flex-grow max-w-3xl mx-auto w-full px-6 py-8">
    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Timestamp to Date</h2>
        <div class="mb-4 flex items-center space-x-4">
            <label class="flex items-center cursor-pointer">
                <input type="radio" name="timezone" value="utc" checked class="mr-2">
                <span class="text-sm text-gray-700">UTC Time</span>
            </label>
            <label class="flex items-center cursor-pointer">
                <input type="radio" name="timezone" value="local" class="mr-2">
                <span class="text-sm text-gray-700">Local Time</span>
            </label>
        </div>
        <div class="flex flex-col space-y-4">
            <div class="relative">
                <input 
                    type="text" 
                    id="timestampInput" 
                    placeholder="Enter Unix timestamp" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:input-focus pr-10"
                    autocomplete="off"
                >
                <button 
                    id="clearTimestampInput"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                >
                    ✕
                </button>
            </div>
            <button id="convertToDateBtn" class="w-full px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">
                Convert to Date
            </button>
            <div id="dateResult" class="mt-4 p-3 rounded-lg min-h-[40px] result-neutral"></div>
        </div>
    </div>

    <!-- 这里已经修复！日期选择框 + 清除按钮不再重叠！-->
    <div class="bg-white rounded-lg shadow-md p-6 mb-8">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Date to Timestamp</h2>
        <div class="flex flex-col space-y-4">
            <div class="relative">
                <input 
                    type="datetime-local" 
                    id="dateInput" 
                    class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:input-focus pr-10"
                >
                <button 
                    id="clearDateInput"
                    class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600"
                >
                    ✕
                </button>
            </div>
            <button id="convertToTimestampBtn" class="w-full px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90">
                Convert to Timestamp
            </button>
            <div id="timestampResult" class="mt-4 p-3 rounded-lg min-h-[40px] result-neutral"></div>
        </div>
    </div>

    <div class="bg-white rounded-lg shadow-md p-6">
        <h2 class="text-xl font-semibold text-gray-800 mb-4">Current Timestamp</h2>
        <button id="getCurrentTimestampBtn" class="w-full px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90">
            Get Current Timestamp
        </button>
        <div id="currentTimestampResult" class="mt-4 p-3 rounded-lg min-h-[40px] result-neutral"></div>
    </div>
</main>

<script>
    function timestampToDate(timestamp) {
        try {
            const cleanTs = timestamp.replace(/[^0-9.]/g, '');
            if (!cleanTs) return { success: false, text: "Please enter a valid timestamp" };
            let tsNum = parseFloat(cleanTs);
            let date;
            if (cleanTs.length === 10 || (cleanTs.includes('.') && cleanTs.split('.')[0].length === 10)) {
                date = new Date(Math.floor(tsNum * 1000));
            } else if (cleanTs.length === 13 || (cleanTs.includes('.') && cleanTs.split('.')[0].length === 13)) {
                date = new Date(Math.floor(tsNum));
            } else {
                return { success: false, text: "Invalid timestamp (10/13 digits)" };
            }
            const timezone = document.querySelector('input[name="timezone"]:checked').value;
            let dateStr = timezone === 'utc' ? date.toUTCString() + " (UTC)" : date.toLocaleString() + " (Local)";
            return { success: true, text: dateStr };
        } catch (e) {
            return { success: false, text: "Error" };
        }
    }

    function dateToTimestamp(dateStr) {
        try {
            if (!dateStr) return { success: false, text: "Please select a date" };
            const date = new Date(dateStr);
            if (isNaN(date.getTime())) return { success: false, text: "Invalid date" };
            const timestampMs = date.getTime();
            const timestampS = Math.floor(timestampMs / 1000);
            return { success: true, text: `13-digit: ${timestampMs} | 10-digit: ${timestampS}` };
        } catch (e) {
            return { success: false, text: "Error" };
        }
    }

    function getCurrentTimestamp() {
        const now = new Date();
        return { success: true, text: `13-digit: ${now.getTime()} | 10-digit: ${Math.floor(now.getTime() / 1000)}` };
    }

    function renderResult(elementId, result) {
        const el = document.getElementById(elementId);
        el.textContent = result.text;
        el.className = `mt-4 p-3 rounded-lg min-h-[40px] ${result.success ? 'result-success' : 'result-error'}`;
    }

    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('convertToDateBtn').addEventListener('click', () => {
            const input = document.getElementById('timestampInput').value.trim();
            renderResult('dateResult', timestampToDate(input));
        });

        document.getElementById('convertToTimestampBtn').addEventListener('click', () => {
            const input = document.getElementById('dateInput').value;
            renderResult('timestampResult', dateToTimestamp(input));
        });

        document.getElementById('getCurrentTimestampBtn').addEventListener('click', () => {
            renderResult('currentTimestampResult', getCurrentTimestamp());
        });

        document.getElementById('clearTimestampInput').addEventListener('click', () => {
            document.getElementById('timestampInput').value = '';
        });

        document.getElementById('clearDateInput').addEventListener('click', () => {
            document.getElementById('dateInput').value = '';
        });
    });
</script>
</body>
</html>
