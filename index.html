<html lang="en">
<head>
    <meta charset="UTF-8">

    <!-- ===================================================================== -->

    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.vercel-insights.com/v1/script.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#2563eb',
                        success: '#16a34a',
                        error: '#dc2626',
                        neutral: '#f3f4f6',
                    },
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .result-success { @apply bg-green-50 border border-green-200 text-green-800; }
            .result-error { @apply bg-red-50 border border-red-200 text-red-800; }
            .result-neutral { @apply bg-gray-50 border border-gray-200 text-gray-700; }
            .input-focus { @apply ring-2 ring-primary/50 border-primary outline-none; }
            .btn-transition { @apply transition-all duration-200 ease-in-out; }
            .copy-btn { @apply absolute right-10 top-1/2 -translate-y-1/2 text-gray-400 hover:text-primary btn-transition; }
            .clear-btn { @apply absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 btn-transition; }
            .dark .result-success { @apply bg-green-900/20 border border-green-800 text-green-200; }
            .dark .result-error { @apply bg-red-900/20 border border-red-800 text-red-200; }
            .dark .result-neutral { @apply bg-gray-800 border border-gray-700 text-gray-300; }
            .dark .input-focus { @apply ring-2 ring-primary/50 border-primary dark:border-primary outline-none; }
        }
    </style>
</head>
<body class="bg-gray-50 dark:bg-gray-900 text-gray-900 dark:text-gray-100 min-h-screen flex flex-col transition-colors duration-200">
<header class="bg-white dark:bg-gray-800 shadow-sm py-4 px-6 transition-colors duration-200">
    <div class="max-w-3xl mx-auto flex justify-between items-center">
        <div>
            <h1 class="text-2xl font-bold text-gray-800 dark:text-gray-100">Unix Timestamp Converter</h1>
            <p class="text-gray-600 dark:text-gray-400 mt-1">Convert between Unix timestamp and datetime easily</p>
        </div>
        <button id="themeToggle" class="p-2 rounded-lg hover:bg-gray-100 dark:hover:bg-gray-700 btn-transition">
            <span id="themeIcon" class="text-xl">🌙</span>
        </button>
    </div>
</header>

<main class="flex-grow max-w-3xl mx-auto w-full px-6 py-8">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-8 transition-colors duration-200">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">Timestamp to Date</h2>
        <div class="mb-4 flex items-center space-x-4">
            <label class="flex items-center cursor-pointer">
                <input type="radio" name="timezone" value="utc" checked class="mr-2">
                <span class="text-sm text-gray-700 dark:text-gray-300">UTC Time</span>
            </label>
            <label class="flex items-center cursor-pointer">
                <input type="radio" name="timezone" value="local" class="mr-2">
                <span class="text-sm text-gray-700 dark:text-gray-300">Local Time</span>
            </label>
        </div>
        <div class="flex flex-col space-y-4">
            <div class="relative">
                <input
                    type="text"
                    id="timestampInput"
                    placeholder="Enter Unix timestamp (10/13 digits)"
                    class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg focus:input-focus pr-20 transition-colors duration-200"
                    autocomplete="off"
                >
                <button id="copyTimestampInput" class="copy-btn dark:text-gray-500 dark:hover:text-primary" title="Copy">📋</button>
                <button id="clearTimestampInput" class="clear-btn dark:text-gray-500 dark:hover:text-gray-300" title="Clear">✕</button>
            </div>
            <div class="flex space-x-3">
                <button id="convertToDateBtn" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 btn-transition">Convert to Date</button>
                <button id="fillCurrentTimestampBtn" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 btn-transition transition-colors duration-200">Current TS</button>
            </div>
            <div id="dateResult" class="mt-4 p-2 rounded-lg min-h-[40px] result-neutral">
                <div class="px-2 py-0.5 text-gray-500">Enter a timestamp and click convert</div>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 mb-8 transition-colors duration-200">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">Date to Timestamp</h2>
        <div class="flex flex-col space-y-4">
            <div class="relative">
                <input type="datetime-local" id="dateInput" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 bg-white dark:bg-gray-700 text-gray-900 dark:text-gray-100 rounded-lg focus:input-focus pr-20 transition-colors duration-200">
                <button id="copyDateInput" class="copy-btn dark:text-gray-500 dark:hover:text-primary" title="Copy">📋</button>
                <button id="clearDateInput" class="clear-btn dark:text-gray-500 dark:hover:text-gray-300" title="Clear">✕</button>
            </div>
            <div class="flex space-x-3">
                <button id="convertToTimestampBtn" class="flex-1 px-4 py-2 bg-primary text-white rounded-lg hover:bg-primary/90 btn-transition">Convert to Timestamp</button>
                <button id="fillCurrentDateBtn" class="px-4 py-2 bg-gray-200 dark:bg-gray-700 text-gray-800 dark:text-gray-200 rounded-lg hover:bg-gray-300 dark:hover:bg-gray-600 btn-transition transition-colors duration-200">Current Date</button>
            </div>
            <div id="timestampResult" class="mt-4 p-2 rounded-lg min-h-[40px] result-neutral">
                <div class="px-2 py-0.5 text-gray-500">Select a date and click convert</div>
            </div>
        </div>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-md p-6 transition-colors duration-200">
        <h2 class="text-xl font-semibold text-gray-800 dark:text-gray-100 mb-4">Current Timestamp</h2>
        <button id="getCurrentTimestampBtn" class="w-full px-4 py-2 bg-success text-white rounded-lg hover:bg-success/90 btn-transition">Get Current Timestamp</button>
        <div id="currentTimestampResult" class="mt-4 p-2 rounded-lg min-h-[40px] result-neutral">
            <div class="px-2 py-0.5 text-gray-500">Click button to get current timestamp</div>
        </div>
    </div>
</main>

<footer class="bg-white dark:bg-gray-800 border-t border-gray-200 dark:border-gray-700 py-6 px-6 mt-auto transition-colors duration-200">
    <div class="max-w-3xl mx-auto flex flex-col sm:flex-row items-center justify-between gap-3 text-sm text-gray-500 dark:text-gray-400">
        <div>
            Contact: <a href="mailto:yunfangrenryf@163.com" class="text-primary hover:underline">yunfangrenryf@163.com</a>
        </div>
        <div>
            <button id="openPrivacyBtn" class="text-primary hover:underline">Privacy Policy</button>
        </div>
    </div>
</footer>

<div id="privacyModal" class="fixed inset-0 z-50 hidden items-center justify-center bg-black/50 p-4">
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-xl w-full max-w-2xl max-h-[80vh] flex flex-col transition-colors duration-200">
        <div class="flex items-center justify-between px-6 py-4 border-b border-gray-200 dark:border-gray-700">
            <h2 class="text-lg font-semibold text-gray-800 dark:text-gray-100">Privacy Policy</h2>
            <button id="closePrivacyBtn" class="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 text-xl leading-none">&times;</button>
        </div>
        <div id="privacyContent" class="overflow-y-auto flex-1">
            <iframe src="privacy-policy.html" class="w-full h-full border-0 min-h-[60vh]"></iframe>
        </div>
    </div>
</div>

<script>
function formatDate(date, timezone = 'utc') {
    if (timezone === 'utc') {
        return `${date.toUTCString()}\n${date.toISOString()}`;
    } else {
        return `${date.toLocaleString()}\n${date.toISOString()}`;
    }
}

function timestampToDate(timestamp) {
    try {
        const cleanTs = timestamp.replace(/[^0-9.]/g, '');
        if (!cleanTs) return { success: false, text: "Please enter a valid timestamp" };
        
        let tsNum = parseFloat(cleanTs);
        if (isNaN(tsNum)) return { success: false, text: "Invalid number format" };

        let date;
        if (cleanTs.length === 10 || (cleanTs.includes('.') && cleanTs.split('.')[0].length === 10)) {
            date = new Date(Math.floor(tsNum * 1000));
        } else if (cleanTs.length === 13 || (cleanTs.includes('.') && cleanTs.split('.')[0].length === 13)) {
            date = new Date(Math.floor(tsNum));
        } else {
            return { success: false, text: `Invalid timestamp (expected 10/13 digits)` };
        }

        if (isNaN(date.getTime())) return { success: false, text: "Timestamp out of valid range" };
        const timezone = document.querySelector('input[name="timezone"]:checked').value;
        return { success: true, text: formatDate(date, timezone) };
    } catch (e) {
        return { success: false, text: "Error parsing timestamp" };
    }
}

function dateToTimestamp(dateStr) {
    try {
        if (!dateStr) return { success: false, text: "Please select a date" };
        const date = new Date(dateStr);
        if (isNaN(date.getTime())) return { success: false, text: "Invalid date format" };
        const ms = date.getTime();
        const s = Math.floor(ms / 1000);
        return { success: true, text: `13-digit (ms): ${ms}\n10-digit (s): ${s}` };
    } catch (e) {
        return { success: false, text: "Error converting date" };
    }
}

function getCurrentTimestamp() {
    const now = new Date();
    return { success: true, text: `13-digit (ms): ${now.getTime()}\n10-digit (s): ${Math.floor(now.getTime() / 1000)}\nISO 8601: ${now.toISOString()}\nRFC 2822: ${now.toUTCString()}` };
}

function renderResult(id, result) {
    const el = document.getElementById(id);
    const lines = result.text.split('\n').filter(l => l.trim() !== '');
    const stateClass = result.neutral ? 'result-neutral' : result.success ? 'result-success' : 'result-error';

    el.innerHTML = '';
    el.className = `mt-4 p-2 rounded-lg min-h-[40px] ${stateClass}`;

    lines.forEach(line => {
        const div = document.createElement('div');
        div.className = 'flex items-center justify-between px-2 py-0.5 rounded cursor-pointer hover:bg-black/5 dark:hover:bg-white/5 group';
        const span = document.createElement('span');
        span.textContent = line;
        const icon = document.createElement('span');
        icon.textContent = '📋';
        icon.className = 'opacity-0 group-hover:opacity-50 text-xs ml-2 flex-shrink-0';
        div.appendChild(span);
        div.appendChild(icon);
        div.addEventListener('click', () => copy(line, icon));
        el.appendChild(div);
    });
}

async function copy(text, btn) {
    try {
        await navigator.clipboard.writeText(text);
        const old = btn.textContent;
        btn.textContent = "✅";
        setTimeout(() => btn.textContent = old, 1000);
    } catch (e) {
        alert("Copy failed");
    }
}

function fillNowDate() {
    const now = new Date();
    const y = now.getFullYear();
    const m = String(now.getMonth()+1).padStart(2,0);
    const d = String(now.getDate()).padStart(2,0);
    const hh = String(now.getHours()).padStart(2,0);
    const mm = String(now.getMinutes()).padStart(2,0);
    document.getElementById('dateInput').value = `${y}-${m}-${d}T${hh}:${mm}`;
}

document.addEventListener('DOMContentLoaded', () => {
    // Theme toggle functionality
    const themeToggle = document.getElementById('themeToggle');
    const themeIcon = document.getElementById('themeIcon');

    // Check for saved theme preference or default to dark
    const currentTheme = localStorage.getItem('theme') || 'dark';
    document.documentElement.classList.toggle('dark', currentTheme === 'dark');
    themeIcon.textContent = currentTheme === 'dark' ? '☀️' : '🌙';

    themeToggle.addEventListener('click', () => {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        themeIcon.textContent = isDark ? '☀️' : '🌙';
    });

    document.getElementById('convertToDateBtn').onclick = () => renderResult('dateResult', timestampToDate(document.getElementById('timestampInput').value));
    document.getElementById('convertToTimestampBtn').onclick = () => renderResult('timestampResult', dateToTimestamp(document.getElementById('dateInput').value));
    document.getElementById('getCurrentTimestampBtn').onclick = () => renderResult('currentTimestampResult', getCurrentTimestamp());

    document.getElementById('clearTimestampInput').onclick = () => { document.getElementById('timestampInput').value = ''; renderResult('dateResult', {neutral:true, text:'Enter a timestamp and click convert'}); };
    document.getElementById('clearDateInput').onclick = () => { document.getElementById('dateInput').value = ''; renderResult('timestampResult', {neutral:true, text:'Select a date and click convert'}); };

    document.getElementById('fillCurrentTimestampBtn').onclick = () => { const t = String(Math.floor(Date.now()/1000)); document.getElementById('timestampInput').value = t; renderResult('dateResult', timestampToDate(t)); };
    document.getElementById('fillCurrentDateBtn').onclick = () => { fillNowDate(); renderResult('timestampResult', dateToTimestamp(document.getElementById('dateInput').value)); };

    document.getElementById('copyTimestampInput').onclick = () => copy(document.getElementById('timestampInput').value, document.getElementById('copyTimestampInput'));
    document.getElementById('copyDateInput').onclick = () => copy(document.getElementById('dateInput').value, document.getElementById('copyDateInput'));
    fillNowDate();

    const modal = document.getElementById('privacyModal');
    document.getElementById('openPrivacyBtn').onclick = () => modal.classList.replace('hidden', 'flex');
    document.getElementById('closePrivacyBtn').onclick = () => modal.classList.replace('flex', 'hidden');
    modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.replace('flex', 'hidden'); });
});
</script>
</body>
</html>
